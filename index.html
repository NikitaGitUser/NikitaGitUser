<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бесконечная дорога - Relax Drive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
        }

        #hud {
            position: absolute;
            top: 24px;
            left: 24px;
            color: white;
            z-index: 100;
            background: rgba(20, 25, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px 24px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: fit-content;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        #speedometer {
            font-size: 56px;
            font-weight: 500;
            background: linear-gradient(135deg, #ffffff, #c0d0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 5px 0 0 0;
            line-height: 1;
            text-shadow: 0 0 30px rgba(100,150,255,0.3);
        }

        #speed-unit {
            font-size: 16px;
            margin-left: 8px;
            opacity: 0.7;
            font-weight: 300;
        }

        #stats {
            display: flex;
            gap: 24px;
            margin-top: 12px;
            font-size: 15px;
            color: rgba(255,255,255,0.8);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-icon {
            font-size: 18px;
        }

        #time-display {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(20, 25, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 20px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        #weather-control {
            position: absolute;
            bottom: 120px;
            left: 24px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .weather-btn {
            background: rgba(20, 25, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .weather-btn:hover, .weather-btn.active {
            background: rgba(60, 80, 120, 0.8);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        #pause-btn {
            position: absolute;
            bottom: 120px;
            right: 24px;
            background: rgba(20, 25, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        #pause-btn:hover {
            background: rgba(60, 80, 120, 0.8);
            transform: scale(1.05);
        }

        #controls-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            #hud {
                top: 16px;
                left: 16px;
                padding: 12px 18px;
            }

            #speedometer {
                font-size: 42px;
            }

            #stats {
                gap: 16px;
                font-size: 13px;
            }

            #time-display {
                top: 16px;
                right: 16px;
                padding: 10px 18px;
                font-size: 16px;
            }

            #weather-control {
                bottom: 100px;
                left: 16px;
            }

            #pause-btn {
                bottom: 100px;
                right: 16px;
                width: 50px;
                height: 50px;
                font-size: 24px;
            }

            .weather-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }

            #controls-hint {
                display: none;
            }
        }
    </style>
</head>
<body>
<div id="hud">
    <div style="font-size: 13px; opacity: 0.6; letter-spacing: 2px; margin-bottom: 4px;">SLOW ROADS</div>
    <div id="speedometer">0<span id="speed-unit">km/h</span></div>
    <div id="stats">
        <div class="stat-item"><span class="stat-icon">🛣️</span> <span id="distance">0</span> km</div>
        <div class="stat-item"><span class="stat-icon">🌄</span> <span id="altitude">0</span> m</div>
    </div>
</div>

<div id="time-display">
    <span>⏱️</span>
    <span id="time">00:00</span>
</div>

<div id="weather-control">
    <div class="weather-btn active" id="weather-sunny">☀️</div>
    <div class="weather-btn" id="weather-cloudy">☁️</div>
    <div class="weather-btn" id="weather-fog">🌫️</div>
    <div class="weather-btn" id="weather-night">🌙</div>
</div>

<div id="pause-btn">⏸️</div>

<div id="controls-hint">
    <span>WASD / ←↑↓→ — управление | Пробел — ручник | C — смена погоды</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // === ИНИЦИАЛИЗАЦИЯ ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 100, 500);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, -12);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.shadowMap.bias = 0.0001;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // === ОСВЕЩЕНИЕ ===
    // Солнце
    const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
    sunLight.position.set(10, 30, 20);
    sunLight.castShadow = true;
    sunLight.receiveShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.left = -50;
    sunLight.shadow.camera.right = 50;
    sunLight.shadow.camera.top = 50;
    sunLight.shadow.camera.bottom = -50;
    sunLight.shadow.camera.near = 1;
    sunLight.shadow.camera.far = 100;
    scene.add(sunLight);

    // Заполняющий свет
    const ambientLight = new THREE.AmbientLight(0x404c66);
    scene.add(ambientLight);

    // === ДОРОГА (процедурная генерация) ===
    const roadWidth = 8;
    const roadLength = 500;
    const roadPoints = [];
    let roadZ = 0;

    // Создаем извилистую дорогу
    for (let z = -roadLength/2; z < roadLength/2; z += 5) {
        // Плавные изгибы с разной частотой
        const x = Math.sin(z * 0.02) * 8 + Math.cos(z * 0.03) * 5 + Math.sin(z * 0.01) * 3;
        roadPoints.push({x, z});
    }

    // Основное полотно дороги
    const roadGeo = new THREE.PlaneGeometry(roadWidth, roadLength);
    const roadMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a1a,
        roughness: 0.8,
        metalness: 0.1,
        emissive: 0x111111
    });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, -0.1, 0);
    road.receiveShadow = true;
    scene.add(road);

    // Боковые полосы
    const lineMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, emissive: 0x111111 });

    const leftLineGeo = new THREE.PlaneGeometry(0.3, roadLength);
    const leftLine = new THREE.Mesh(leftLineGeo, lineMat);
    leftLine.rotation.x = -Math.PI / 2;
    leftLine.position.set(-roadWidth/2 + 0.4, 0, 0);
    leftLine.receiveShadow = true;
    scene.add(leftLine);

    const rightLineGeo = new THREE.PlaneGeometry(0.3, roadLength);
    const rightLine = new THREE.Mesh(rightLineGeo, lineMat);
    rightLine.rotation.x = -Math.PI / 2;
    rightLine.position.set(roadWidth/2 - 0.4, 0, 0);
    rightLine.receiveShadow = true;
    scene.add(rightLine);

    // Центральная разметка (пунктир)
    const centerLineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0x332200 });

    for (let i = -roadLength/2 + 5; i < roadLength/2; i += 10) {
        const lineGeo = new THREE.PlaneGeometry(0.8, 3);
        const line = new THREE.Mesh(lineGeo, centerLineMat);
        line.rotation.x = -Math.PI / 2;
        line.position.set(0, 0.05, i);
        line.receiveShadow = true;
        scene.add(line);
    }

    // === КРАСИВАЯ МАШИНА ===
    const carGroup = new THREE.Group();

    // Основной кузов (обтекаемый)
    const bodyGeo = new THREE.BoxGeometry(2.4, 0.8, 5.0);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x3366cc,
        roughness: 0.2,
        metalness: 0.9,
        emissive: 0x112233
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.4;
    body.castShadow = true;
    body.receiveShadow = true;
    carGroup.add(body);

    // Передняя часть
    const frontGeo = new THREE.BoxGeometry(2.2, 0.7, 1.2);
    const frontMat = new THREE.MeshStandardMaterial({ color: 0x4477dd, metalness: 1.0 });
    const front = new THREE.Mesh(frontGeo, frontMat);
    front.position.set(0, 0.45, 2.2);
    front.castShadow = true;
    front.receiveShadow = true;
    carGroup.add(front);

    // Задняя часть
    const rearGeo = new THREE.BoxGeometry(2.3, 0.8, 1.0);
    const rearMat = new THREE.MeshStandardMaterial({ color: 0x2255aa, metalness: 0.8 });
    const rear = new THREE.Mesh(rearGeo, rearMat);
    rear.position.set(0, 0.45, -2.2);
    rear.castShadow = true;
    rear.receiveShadow = true;
    carGroup.add(rear);

    // Кабина (стекло)
    const cabinGeo = new THREE.BoxGeometry(2.0, 0.7, 2.0);
    const cabinMat = new THREE.MeshStandardMaterial({
        color: 0x88aadd,
        transparent: true,
        opacity: 0.3,
        emissive: 0x112233
    });
    const cabin = new THREE.Mesh(cabinGeo, cabinMat);
    cabin.position.set(0, 1.1, 0.2);
    cabin.castShadow = true;
    cabin.receiveShadow = true;
    carGroup.add(cabin);

    // Крыша
    const roofGeo = new THREE.BoxGeometry(1.8, 0.3, 1.6);
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x111122, metalness: 0.9 });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.set(0, 1.5, 0.1);
    roof.castShadow = true;
    roof.receiveShadow = true;
    carGroup.add(roof);

    // Спойлер
    const spoilerGeo = new THREE.BoxGeometry(2.2, 0.2, 0.3);
    const spoilerMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 1.0 });
    const spoiler = new THREE.Mesh(spoilerGeo, spoilerMat);
    spoiler.position.set(0, 1.1, -2.3);
    spoiler.castShadow = true;
    carGroup.add(spoiler);

    // Колеса
    const wheelPositions = [
        [-1.4, 0.4, 1.5],
        [1.4, 0.4, 1.5],
        [-1.4, 0.4, -1.4],
        [1.4, 0.4, -1.4]
    ];

    wheelPositions.forEach(pos => {
        // Шина
        const tireGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.7, 32);
        const tireMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const tire = new THREE.Mesh(tireGeo, tireMat);
        tire.rotation.z = Math.PI / 2;
        tire.position.set(pos[0], pos[1], pos[2]);
        tire.castShadow = true;
        tire.receiveShadow = true;
        carGroup.add(tire);

        // Диск
        const rimGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.71, 8);
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 1.0 });
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.rotation.z = Math.PI / 2;
        rim.position.set(pos[0], pos[1], pos[2]);
        rim.castShadow = true;
        carGroup.add(rim);

        // Спицы
        for (let i = 0; i < 5; i++) {
            const spokeGeo = new THREE.BoxGeometry(0.1, 1.2, 0.1);
            const spokeMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
            const spoke = new THREE.Mesh(spokeGeo, spokeMat);
            spoke.rotation.y = (i / 5) * Math.PI * 2;
            spoke.rotation.z = Math.PI / 2;
            spoke.position.set(pos[0], pos[1], pos[2]);
            carGroup.add(spoke);
        }
    });

    // Фары
    const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0x442200 });

    const leftLight = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.2, 8), lightMat);
    leftLight.rotation.x = Math.PI / 2;
    leftLight.position.set(-1.0, 0.6, 2.3);
    carGroup.add(leftLight);

    const rightLight = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.2, 8), lightMat);
    rightLight.rotation.x = Math.PI / 2;
    rightLight.position.set(1.0, 0.6, 2.3);
    carGroup.add(rightLight);

    // Задние фонари
    const tailMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x330000 });

    const tailLeft = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.2), tailMat);
    tailLeft.position.set(-1.1, 0.6, -2.3);
    carGroup.add(tailLeft);

    const tailRight = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.2), tailMat);
    tailRight.position.set(1.1, 0.6, -2.3);
    carGroup.add(tailRight);

    carGroup.position.set(0, 0, 0);
    scene.add(carGroup);

    // === ЛАНДШАФТ (холмы и деревья) ===
    // Создаем холмы
    const hillCount = 30;
    for (let i = 0; i < hillCount; i++) {
        const hillGeo = new THREE.ConeGeometry(15 + Math.random() * 20, 10 + Math.random() * 15, 16);
        const hillMat = new THREE.MeshStandardMaterial({ color: 0x3d6b3d });
        const hill = new THREE.Mesh(hillGeo, hillMat);

        // Располагаем холмы по бокам дороги
        const side = Math.random() > 0.5 ? 1 : -1;
        const zPos = -200 + Math.random() * 400;
        const xPos = side * (30 + Math.random() * 40);

        hill.position.set(xPos, -2, zPos);
        hill.castShadow = true;
        hill.receiveShadow = true;
        scene.add(hill);
    }

    // Деревья
    function createTree(x, z) {
        const treeGroup = new THREE.Group();

        // Ствол
        const trunkGeo = new THREE.CylinderGeometry(0.5, 0.7, 3);
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = 1.5;
        trunk.castShadow = true;
        trunk.receiveShadow = true;
        treeGroup.add(trunk);

        // Листва
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x3a8c3a });

        const leaf1 = new THREE.Mesh(new THREE.ConeGeometry(1.2, 1.5, 6), leafMat);
        leaf1.position.y = 3.0;
        leaf1.castShadow = true;
        leaf1.receiveShadow = true;
        treeGroup.add(leaf1);

        const leaf2 = new THREE.Mesh(new THREE.ConeGeometry(1.0, 1.2, 6), leafMat);
        leaf2.position.y = 4.2;
        leaf2.castShadow = true;
        leaf2.receiveShadow = true;
        treeGroup.add(leaf2);

        treeGroup.position.set(x, 0, z);
        return treeGroup;
    }

    // Расставляем деревья
    for (let i = -200; i < 200; i += 15) {
        for (let s = -1; s <= 1; s += 2) {
            const xPos = s * (roadWidth/2 + 5 + Math.random() * 10);
            const zPos = i + Math.random() * 10;

            if (Math.random() > 0.3) {
                const tree = createTree(xPos, zPos);
                scene.add(tree);
            }
        }
    }

    // === ИГРОВЫЕ ПЕРЕМЕННЫЕ ===
    let speed = 0;
    const maxSpeed = 3.5;
    const acceleration = 0.04;
    let carX = 0;
    let carZ = 0;
    let totalDistance = 0;
    let minutes = 0;
    let seconds = 0;
    let gamePaused = false;
    let currentWeather = 'sunny';

    // Управление
    const keys = {};

    document.addEventListener('keydown', (e) => {
        if (!gamePaused) {
            const key = e.key.toLowerCase();
            keys[key] = true;
            e.preventDefault();
        }
    });

    document.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        keys[key] = false;
        e.preventDefault();
    });

    // Погода
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'c') {
            cycleWeather();
        }
    });

    document.querySelectorAll('.weather-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const weather = btn.id.replace('weather-', '');
            setWeather(weather);
        });
    });

    function setWeather(weather) {
        currentWeather = weather;

        document.querySelectorAll('.weather-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`weather-${weather}`).classList.add('active');

        switch(weather) {
            case 'sunny':
                scene.background.setHex(0x87CEEB);
                scene.fog.color.setHex(0x87CEEB);
                sunLight.color.setHex(0xfff5e6);
                sunLight.intensity = 1.2;
                break;
            case 'cloudy':
                scene.background.setHex(0x88aacc);
                scene.fog.color.setHex(0x88aacc);
                sunLight.color.setHex(0xcccccc);
                sunLight.intensity = 0.8;
                break;
            case 'fog':
                scene.background.setHex(0xaaaaaa);
                scene.fog.color.setHex(0xaaaaaa);
                scene.fog.near = 50;
                scene.fog.far = 200;
                sunLight.intensity = 0.5;
                break;
            case 'night':
                scene.background.setHex(0x0a0a1a);
                scene.fog.color.setHex(0x0a0a1a);
                sunLight.color.setHex(0x4466aa);
                sunLight.intensity = 0.3;
                break;
        }
    }

    function cycleWeather() {
        const weathers = ['sunny', 'cloudy', 'fog', 'night'];
        const currentIndex = weathers.indexOf(currentWeather);
        const nextIndex = (currentIndex + 1) % weathers.length;
        setWeather(weathers[nextIndex]);
    }

    // Пауза
    document.getElementById('pause-btn').addEventListener('click', () => {
        gamePaused = !gamePaused;
        document.getElementById('pause-btn').textContent = gamePaused ? '▶️' : '⏸️';
    });

    // Таймер
    setInterval(() => {
        if (!gamePaused && speed > 0.1) {
            seconds++;
            if (seconds >= 60) {
                seconds = 0;
                minutes++;
            }
            document.getElementById('time').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    }, 1000);

    // Анимация
    function animate() {
        if (!gamePaused) {
            // Управление
            const gas = keys['w'] || keys['arrowup'];
            const brake = keys['s'] || keys['arrowdown'];
            const left = keys['a'] || keys['arrowleft'];
            const right = keys['d'] || keys['arrowright'];
            const handbrake = keys[' '];

            // Акселерация
            if (gas) {
                speed = Math.min(speed + acceleration, maxSpeed);
            } else if (brake) {
                speed = Math.max(speed - acceleration * 2, -maxSpeed/2);
            } else if (handbrake) {
                speed *= 0.95;
            } else {
                speed *= 0.99;
            }

            // Поворот
            const turnAmount = 0.02 * (speed / maxSpeed);
            if (left) {
                carX -= turnAmount;
                carGroup.rotation.y = 0.25;
            } else if (right) {
                carX += turnAmount;
                carGroup.rotation.y = -0.25;
            } else {
                carGroup.rotation.y *= 0.9;
            }

            // Ограничители
            carX = Math.max(Math.min(carX, 4), -4);

            // Движение вперед
            carZ += speed;
            totalDistance += Math.abs(speed) * 0.02;

            // Обновление позиции машины
            carGroup.position.x = carX;
            carGroup.position.z = 0; // Машина всегда в центре, двигаем мир

            // Двигаем дорогу и окружение
            scene.children.forEach(child => {
                if (child !== carGroup && child !== sunLight && child !== ambientLight) {
                    child.position.z -= speed * 0.5;

                    // Сброс позиции для бесконечности
                    if (child.position.z < -300) {
                        child.position.z += 600;

                        // Обновляем позицию X для дороги и объектов
                        if (child.geometry && child.geometry.type === 'PlaneGeometry' && child.material.color.getHex() === 0x1a1a1a) {
                            // Это дорога - обновляем ее изгиб
                            child.position.x = 0; // Будем обновлять позже
                        }
                    }
                }
            });

            // Вращение колес
            carGroup.children.forEach(child => {
                if (child.geometry && child.geometry.type === 'CylinderGeometry' && child.position.y < 0.6) {
                    child.rotation.x += speed * 0.3;
                }
            });

            // Камера
            camera.position.x = carX * 0.3;
            camera.position.z = -12;
            camera.position.y = 5 + Math.sin(totalDistance * 0.1) * 0.1;
            camera.lookAt(carX, 1.5, 5);

            // HUD
            document.getElementById('speedometer').innerHTML =
                Math.floor(Math.abs(speed) * 35) + '<span id="speed-unit">km/h</span>';
            document.getElementById('distance').textContent = (totalDistance / 100).toFixed(1);
            document.getElementById('altitude').textContent = Math.floor(Math.sin(totalDistance * 0.05) * 50 + 100);
        }

        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    animate();

    // Ресайз
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
