<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бесконечная трасса - Плавная дорога</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #000;
        }

        #hud {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: max(20px, env(safe-area-inset-left));
            color: white;
            z-index: 100;
            background: rgba(10, 20, 30, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: clamp(15px, 4vw, 25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: fit-content;
            font-weight: 300;
        }

        #speedometer {
            font-size: clamp(40px, 10vw, 70px);
            font-weight: 500;
            background: linear-gradient(135deg, #fff, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 5px 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        #distance {
            font-size: clamp(16px, 4vw, 24px);
            color: rgba(255,255,255,0.9);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #distance span {
            color: #ffd700;
            font-weight: 600;
        }

        #minimap-container {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: max(20px, env(safe-area-inset-right));
            width: clamp(130px, 30vw, 220px);
            height: clamp(130px, 30vw, 220px);
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 2px solid rgba(255,215,0,0.4);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            overflow: hidden;
            z-index: 100;
        }

        #minimap {
            width: 100%;
            height: 100%;
            display: block;
        }

        #controls-desktop {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(10, 20, 30, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 35px;
            border-radius: 50px;
            border: 1px solid rgba(255,215,0,0.4);
            font-size: 18px;
            letter-spacing: 3px;
            z-index: 100;
            display: flex;
            gap: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .key {
            background: rgba(255,255,255,0.15);
            padding: 8px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,215,0,0.4);
            font-weight: 600;
            color: #ffd700;
        }

        #controls-mobile {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            left: 0;
            right: 0;
            display: none;
            justify-content: center;
            gap: clamp(15px, 6vw, 40px);
            padding: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        .control-btn {
            width: clamp(80px, 20vw, 120px);
            height: clamp(80px, 20vw, 120px);
            background: rgba(20, 30, 40, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(40px, 10vw, 60px);
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
            transition: all 0.1s ease;
            text-shadow: 0 0 15px rgba(255,215,0,0.5);
        }

        .control-btn:active {
            transform: scale(0.85);
            background: rgba(255,215,0,0.25);
            border-color: #ffd700;
        }

        #pause-btn {
            position: absolute;
            bottom: 120px;
            right: max(20px, env(safe-area-inset-right));
            background: rgba(20, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.4);
            color: white;
            width: clamp(55px, 14vw, 80px);
            height: clamp(55px, 14vw, 80px);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(28px, 7vw, 42px);
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        #pause-btn:active {
            transform: scale(0.9);
            background: rgba(255,215,0,0.25);
            border-color: #ffd700;
        }

        #time-display {
            position: absolute;
            bottom: 120px;
            left: max(20px, env(safe-area-inset-left));
            background: rgba(20, 30, 40, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255,215,0,0.4);
            color: white;
            font-size: clamp(18px, 4vw, 24px);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            #controls-desktop {
                display: none;
            }

            #controls-mobile {
                display: block;
            }

            #hud {
                top: 10px;
                left: 10px;
                padding: 12px 15px;
            }

            #minimap-container {
                top: 10px;
                right: 10px;
                width: 100px;
                height: 100px;
            }

            #time-display {
                bottom: 180px;
                left: 10px;
                padding: 10px 18px;
            }

            #pause-btn {
                bottom: 180px;
                right: 10px;
                width: 55px;
                height: 55px;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
<div id="hud">
    <div style="font-size: clamp(12px, 3vw, 16px); opacity: 0.8; margin-bottom: 5px;">🏁 INFINITY HIGHWAY</div>
    <div id="speedometer">0 km/h</div>
    <div id="distance">🛣️ <span id="distanceValue">0</span> km</div>
</div>

<div id="minimap-container">
    <canvas id="minimap" width="220" height="220"></canvas>
</div>

<div id="time-display">
    <span id="time-icon">⏱️</span>
    <span id="time">00:00</span>
</div>

<div id="controls-desktop">
    <span class="key">WASD</span>
    <span class="key">↑↓←→</span>
</div>

<div id="controls-mobile">
    <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="control-btn" id="btn-up">⬆️</div>
        <div style="display: flex; gap: clamp(15px, 6vw, 40px); margin-top: 15px;">
            <div class="control-btn" id="btn-left">⬅️</div>
            <div class="control-btn" id="btn-down">⬇️</div>
            <div class="control-btn" id="btn-right">➡️</div>
        </div>
    </div>
</div>

<div id="pause-btn">⏸️</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    $(document).ready(function() {
        // === НАСТРОЙКИ СЦЕНЫ ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1420); // Глубокий синий
        scene.fog = new THREE.Fog(0x0a1420, 80, 400);

        // Камера
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, -14);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.shadowMap.bias = 0.0005;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // === ОСВЕЩЕНИЕ ===
        // Основной свет (луна/солнце)
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        mainLight.position.set(10, 30, 20);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.left = -50;
        mainLight.shadow.camera.right = 50;
        mainLight.shadow.camera.top = 50;
        mainLight.shadow.camera.bottom = -50;
        mainLight.shadow.camera.near = 1;
        mainLight.shadow.camera.far = 100;
        scene.add(mainLight);

        // Заполняющий свет
        const ambientLight = new THREE.AmbientLight(0x404c66);
        scene.add(ambientLight);

        // Подсветка дороги
        const roadLight = new THREE.PointLight(0x4466aa, 0.5);
        roadLight.position.set(0, 5, 0);
        scene.add(roadLight);

        // Звезды
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starsPositions = new Float32Array(starsCount * 3);

        for (let i = 0; i < starsCount * 3; i += 3) {
            starsPositions[i] = (Math.random() - 0.5) * 1000;
            starsPositions[i+1] = (Math.random() - 0.5) * 1000;
            starsPositions[i+2] = (Math.random() - 0.5) * 1000 - 300;
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // === ЦЕЛЬНАЯ ДОРОГА (одна большая лента) ===
        const roadWidth = 9;
        const roadLength = 500;

        // Основное полотно дороги (одна цельная полоса)
        const roadGeo = new THREE.PlaneGeometry(roadWidth, roadLength);
        const roadMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            roughness: 0.7,
            metalness: 0.2,
            emissive: 0x111111
        });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.set(0, -0.1, 0);
        road.receiveShadow = true;
        road.castShadow = true;
        scene.add(road);

        // Создаем изгибы дороги с помощью деформации (НЕ РАЗРЫВАМИ)
        // Будем двигать точки дороги процедурно

        // Верхний слой асфальта (чтобы скрыть швы)
        const roadTopGeo = new THREE.PlaneGeometry(roadWidth - 0.2, roadLength);
        const roadTopMat = new THREE.MeshStandardMaterial({
            color: 0x222222,
            roughness: 0.8,
            metalness: 0.1
        });
        const roadTop = new THREE.Mesh(roadTopGeo, roadTopMat);
        roadTop.rotation.x = -Math.PI / 2;
        roadTop.position.set(0, -0.05, 0);
        roadTop.receiveShadow = true;
        scene.add(roadTop);

        // Боковые полосы (цельные)
        const sideLineMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, emissive: 0x111111 });

        const leftLineGeo = new THREE.PlaneGeometry(0.3, roadLength);
        const leftLine = new THREE.Mesh(leftLineGeo, sideLineMat);
        leftLine.rotation.x = -Math.PI / 2;
        leftLine.position.set(-roadWidth/2 + 0.4, 0, 0);
        leftLine.receiveShadow = true;
        scene.add(leftLine);

        const rightLineGeo = new THREE.PlaneGeometry(0.3, roadLength);
        const rightLine = new THREE.Mesh(rightLineGeo, sideLineMat);
        rightLine.rotation.x = -Math.PI / 2;
        rightLine.position.set(roadWidth/2 - 0.4, 0, 0);
        rightLine.receiveShadow = true;
        scene.add(rightLine);

        // Разметка (пунктирная линия)
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0x332200 });

        for (let i = -roadLength/2 + 5; i < roadLength/2; i += 8) {
            const lineGeo = new THREE.PlaneGeometry(0.8, 3);
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.set(0, 0.05, i);
            line.receiveShadow = true;
            scene.add(line);
        }

        // Светоотражатели
        const reflectorMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 });

        for (let i = -roadLength/2; i < roadLength/2; i += 4) {
            const leftRef = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6), reflectorMat);
            leftRef.position.set(-roadWidth/2 + 0.2, 0.1, i);
            scene.add(leftRef);

            const rightRef = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6), reflectorMat);
            rightRef.position.set(roadWidth/2 - 0.2, 0.1, i);
            scene.add(rightRef);
        }

        // === КРАСИВАЯ МАШИНА (суперкар) ===
        const carGroup = new THREE.Group();

        // Основной монолитный кузов
        const mainBodyGeo = new THREE.BoxGeometry(2.5, 0.9, 5.2);
        const mainBodyMat = new THREE.MeshStandardMaterial({
            color: 0xff3300,
            emissive: 0x331100,
            roughness: 0.2,
            metalness: 0.9,
            emissiveIntensity: 0.2
        });
        const mainBody = new THREE.Mesh(mainBodyGeo, mainBodyMat);
        mainBody.position.y = 0.45;
        mainBody.castShadow = true;
        mainBody.receiveShadow = true;
        carGroup.add(mainBody);

        // Передний обтекатель
        const frontGeo = new THREE.BoxGeometry(2.3, 0.7, 1.0);
        const frontMat = new THREE.MeshStandardMaterial({
            color: 0xff4400,
            metalness: 1.0,
            roughness: 0.1
        });
        const front = new THREE.Mesh(frontGeo, frontMat);
        front.position.set(0, 0.5, 2.4);
        front.castShadow = true;
        front.receiveShadow = true;
        carGroup.add(front);

        // Задний диффузор
        const rearGeo = new THREE.BoxGeometry(2.4, 0.6, 1.0);
        const rearMat = new THREE.MeshStandardMaterial({
            color: 0xff2200,
            metalness: 0.8
        });
        const rear = new THREE.Mesh(rearGeo, rearMat);
        rear.position.set(0, 0.4, -2.4);
        rear.castShadow = true;
        rear.receiveShadow = true;
        carGroup.add(rear);

        // Кабина (тонированное стекло)
        const cabinGeo = new THREE.BoxGeometry(2.1, 0.9, 2.2);
        const cabinMat = new THREE.MeshStandardMaterial({
            color: 0x88aadd,
            transparent: true,
            opacity: 0.3,
            emissive: 0x112233,
            metalness: 0.4,
            roughness: 0.1
        });
        const cabin = new THREE.Mesh(cabinGeo, cabinMat);
        cabin.position.set(0, 1.2, 0.1);
        cabin.castShadow = true;
        cabin.receiveShadow = true;
        carGroup.add(cabin);

        // Крыша
        const roofGeo = new THREE.BoxGeometry(1.9, 0.3, 1.8);
        const roofMat = new THREE.MeshStandardMaterial({
            color: 0x111111,
            metalness: 1.0,
            roughness: 0.2
        });
        const roof = new THREE.Mesh(roofGeo, roofMat);
        roof.position.set(0, 1.65, 0.1);
        roof.castShadow = true;
        roof.receiveShadow = true;
        carGroup.add(roof);

        // Спойлер
        const spoilerGeo = new THREE.BoxGeometry(2.3, 0.25, 0.3);
        const spoilerMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9 });
        const spoiler = new THREE.Mesh(spoilerGeo, spoilerMat);
        spoiler.position.set(0, 1.3, -2.4);
        spoiler.castShadow = true;
        carGroup.add(spoiler);

        // Колеса (увеличенные)
        const wheelPositions = [
            [-1.5, 0.5, 1.7],
            [1.5, 0.5, 1.7],
            [-1.5, 0.5, -1.5],
            [1.5, 0.5, -1.5]
        ];

        wheelPositions.forEach(pos => {
            // Шина
            const tireGeo = new THREE.CylinderGeometry(0.9, 0.9, 0.8, 32);
            const tireMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const tire = new THREE.Mesh(tireGeo, tireMat);
            tire.rotation.z = Math.PI / 2;
            tire.position.set(pos[0], pos[1], pos[2]);
            tire.castShadow = true;
            tire.receiveShadow = true;
            carGroup.add(tire);

            // Диск
            const rimGeo = new THREE.CylinderGeometry(0.7, 0.7, 0.81, 10);
            const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 1.0, roughness: 0.1 });
            const rim = new THREE.Mesh(rimGeo, rimMat);
            rim.rotation.z = Math.PI / 2;
            rim.position.set(pos[0], pos[1], pos[2]);
            rim.castShadow = true;
            carGroup.add(rim);

            // Спицы (золотые)
            for (let i = 0; i < 6; i++) {
                const spokeGeo = new THREE.BoxGeometry(0.1, 1.4, 0.1);
                const spokeMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.9 });
                const spoke = new THREE.Mesh(spokeGeo, spokeMat);
                spoke.rotation.y = (i / 6) * Math.PI * 2;
                spoke.rotation.z = Math.PI / 2;
                spoke.position.set(pos[0], pos[1], pos[2]);
                carGroup.add(spoke);
            }
        });

        // Фары
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0x442200 });

        const leftHeadlight = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.2, 12), lightMat);
        leftHeadlight.rotation.x = Math.PI / 2;
        leftHeadlight.position.set(-1.0, 0.7, 2.5);
        carGroup.add(leftHeadlight);

        const rightHeadlight = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.2, 12), lightMat);
        rightHeadlight.rotation.x = Math.PI / 2;
        rightHeadlight.position.set(1.0, 0.7, 2.5);
        carGroup.add(rightHeadlight);

        // Дневные ходовые огни (LED)
        const drlMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x113366 });

        const drlLeft = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.3), drlMat);
        drlLeft.position.set(-1.2, 0.5, 2.3);
        carGroup.add(drlLeft);

        const drlRight = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.3), drlMat);
        drlRight.position.set(1.2, 0.5, 2.3);
        carGroup.add(drlRight);

        // Задние фонари
        const tailMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x330000 });

        const tailLeft = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.2), tailMat);
        tailLeft.position.set(-1.2, 0.7, -2.5);
        carGroup.add(tailLeft);

        const tailRight = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.2), tailMat);
        tailRight.position.set(1.2, 0.7, -2.5);
        carGroup.add(tailRight);

        // Неоновая подсветка
        const neonLight = new THREE.PointLight(0xff5500, 2, 10);
        neonLight.position.set(0, 0.2, 0);
        carGroup.add(neonLight);

        carGroup.position.set(0, 0, 0);
        scene.add(carGroup);

        // === ДЕРЕВЬЯ И ПРИРОДА ===
        function createTree(x, z) {
            const treeGroup = new THREE.Group();

            // Ствол
            const trunkGeo = new THREE.CylinderGeometry(0.6, 0.8, 4);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 2;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            treeGroup.add(trunk);

            // Листва
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2E8B57 });

            const leaf1 = new THREE.Mesh(new THREE.ConeGeometry(1.5, 2, 6), leafMat);
            leaf1.position.y = 3.5;
            leaf1.castShadow = true;
            leaf1.receiveShadow = true;
            treeGroup.add(leaf1);

            const leaf2 = new THREE.Mesh(new THREE.ConeGeometry(1.2, 1.8, 6), leafMat);
            leaf2.position.y = 5;
            leaf2.castShadow = true;
            leaf2.receiveShadow = true;
            treeGroup.add(leaf2);

            treeGroup.position.set(x, 0, z);
            return treeGroup;
        }

        function createFlower(x, z) {
            const flowerGroup = new THREE.Group();

            const stemGeo = new THREE.CylinderGeometry(0.05, 0.08, 0.5);
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x44aa44 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.y = 0.25;
            flowerGroup.add(stem);

            const colors = [0xff69b4, 0xff4500, 0xff1493, 0xffa500, 0xffff00];
            const flowerGeo = new THREE.SphereGeometry(0.15, 6);
            const flowerMat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
            const flower = new THREE.Mesh(flowerGeo, flowerMat);
            flower.position.y = 0.55;
            flowerGroup.add(flower);

            flowerGroup.position.set(x, 0, z);
            return flowerGroup;
        }

        // Расставляем объекты
        for (let i = -200; i < 200; i += 20) {
            for (let s = -1; s <= 1; s += 2) {
                const xPos = s * (roadWidth/2 + 5 + Math.random() * 8);
                const zPos = i + Math.random() * 10;

                if (Math.random() > 0.5) {
                    const tree = createTree(xPos, zPos);
                    scene.add(tree);
                } else if (Math.random() > 0.3) {
                    const flower = createFlower(xPos + (Math.random()-0.5)*2, zPos);
                    scene.add(flower);
                }
            }
        }

        // === ИГРОВЫЕ ПЕРЕМЕННЫЕ ===
        let speed = 0;
        const maxSpeed = 3.0;
        const acceleration = 0.03;
        let carX = 0;
        let carZ = 0;
        let totalDistance = 0;
        let minutes = 0;
        let seconds = 0;
        let gamePaused = false;

        // Для мобильного управления
        const touchControls = {
            up: false,
            down: false,
            left: false,
            right: false
        };

        // === МИНИ-КАРТА ===
        const minimapCanvas = document.getElementById('minimap');
        const ctx = minimapCanvas.getContext('2d');

        function updateMinimap() {
            ctx.clearRect(0, 0, 220, 220);

            // Фон
            ctx.fillStyle = '#1a2a1a';
            ctx.fillRect(0, 0, 220, 220);

            // Дорога (прямая на карте, но красиво)
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 14;
            ctx.beginPath();
            ctx.moveTo(110, 0);
            ctx.lineTo(110, 220);
            ctx.stroke();

            // Разметка
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 4;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(110, 0);
            ctx.lineTo(110, 220);
            ctx.stroke();
            ctx.setLineDash([]);

            // Машина
            ctx.fillStyle = '#ff4400';
            ctx.shadowColor = '#ffaa00';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(110 + carX * 3, 190, 6, 0, 2 * Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // === УПРАВЛЕНИЕ ===
        const keys = {};

        $(document).keydown(function(e) {
            if (!gamePaused) {
                const key = e.key.toLowerCase();
                keys[key] = true;
                e.preventDefault();
            }
        });

        $(document).keyup(function(e) {
            const key = e.key.toLowerCase();
            keys[key] = false;
            e.preventDefault();
        });

        // Мобильные кнопки
        $('#btn-up').on('mousedown touchstart', function(e) {
            e.preventDefault();
            touchControls.up = true;
        }).on('mouseup touchend mouseleave touchcancel', function() {
            touchControls.up = false;
        });

        $('#btn-down').on('mousedown touchstart', function(e) {
            e.preventDefault();
            touchControls.down = true;
        }).on('mouseup touchend mouseleave touchcancel', function() {
            touchControls.down = false;
        });

        $('#btn-left').on('mousedown touchstart', function(e) {
            e.preventDefault();
            touchControls.left = true;
        }).on('mouseup touchend mouseleave touchcancel', function() {
            touchControls.left = false;
        });

        $('#btn-right').on('mousedown touchstart', function(e) {
            e.preventDefault();
            touchControls.right = true;
        }).on('mouseup touchend mouseleave touchcancel', function() {
            touchControls.right = false;
        });

        // Пауза
        $('#pause-btn').click(function() {
            gamePaused = !gamePaused;
            $(this).text(gamePaused ? '▶️' : '⏸️');
        });

        // Таймер
        setInterval(function() {
            if (!gamePaused && speed > 0.1) {
                seconds++;
                if (seconds >= 60) {
                    seconds = 0;
                    minutes++;
                }
                $('#time').text(`${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`);
            }
        }, 1000);

        // === АНИМАЦИЯ ДВИЖЕНИЯ ДОРОГИ (эффект бесконечности) ===
        let roadOffset = 0;

        function animate() {
            if (!gamePaused) {
                // Управление
                const gasPressed = keys['w'] || keys['ц'] || keys['arrowup'] || touchControls.up;
                const brakePressed = keys['s'] || keys['ы'] || keys['arrowdown'] || touchControls.down;
                const leftPressed = keys['a'] || keys['ф'] || keys['arrowleft'] || touchControls.left;
                const rightPressed = keys['d'] || keys['в'] || keys['arrowright'] || touchControls.right;

                // Акселерация
                if (gasPressed) {
                    speed = Math.min(speed + acceleration, maxSpeed);
                } else if (brakePressed) {
                    speed = Math.max(speed - acceleration * 2, -maxSpeed/2);
                } else {
                    speed *= 0.99;
                }

                // Поворот
                const turnSpeed = 0.02 * (Math.abs(speed) / maxSpeed);
                if (leftPressed) {
                    carX -= turnSpeed;
                    carGroup.rotation.y = 0.25;
                } else if (rightPressed) {
                    carX += turnSpeed;
                    carGroup.rotation.y = -0.25;
                } else {
                    carGroup.rotation.y *= 0.9;
                }

                // Ограничитель
                carX = Math.max(Math.min(carX, 4.5), -4.5);

                // Движение вперед (эффект бесконечной дороги)
                roadOffset += speed;
                totalDistance += Math.abs(speed) * 0.02;

                // Двигаем все объекты, чтобы создать иллюзию движения
                // Вращаем звезды для эффекта
                stars.rotation.y += 0.0002;

                // Обновление HUD
                $('#speedometer').text(Math.floor(Math.abs(speed) * 45) + ' km/h');
                $('#distanceValue').text((totalDistance / 100).toFixed(1));

                // Позиция машины
                carGroup.position.x = carX;

                // Камера следует за машиной
                camera.position.x = carX * 0.3;
                camera.position.z = -14;
                camera.position.y = 5 + Math.sin(Date.now() * 0.002) * 0.2;
                camera.lookAt(carX, 1.5, 5);

                // Вращение колес
                carGroup.children.forEach(child => {
                    if (child.geometry && child.geometry.type === 'CylinderGeometry' && child.position.y < 0.6) {
                        child.rotation.x += speed * 0.4;
                    }
                });

                // Анимация разметки (движение)
                scene.children.forEach(child => {
                    if (child.material && child.material.color && child.material.color.getHex() === 0xffdd99 && child.geometry && child.geometry.parameters && child.geometry.parameters.width === 0.8) {
                        // Это линии разметки - двигаем их
                        child.position.z -= speed * 0.5;

                        // Сброс позиции
                        if (child.position.z < -250) {
                            child.position.z += 500;
                        }
                    }

                    // Светоотражатели тоже двигаем
                    if (child.material && child.material.color && child.material.color.getHex() === 0xffaa00 && child.geometry && child.geometry.type === 'SphereGeometry') {
                        child.position.z -= speed * 0.5;

                        if (child.position.z < -250) {
                            child.position.z += 500;
                        }
                    }
                });
            }

            // Мини-карта
            updateMinimap();

            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        animate();

        // Ресайз
        $(window).resize(function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Предотвращаем скролл на мобильных
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.classList.contains('control-btn')) {
                e.preventDefault();
            }
        }, { passive: false });
    });
</script>
</body>
</html>
